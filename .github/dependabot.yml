version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Indian/Maldives"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      composer-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Indian/Maldives"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "Indian/Maldives"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
